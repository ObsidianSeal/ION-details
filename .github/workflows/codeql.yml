name: "CodeQL Advanced"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  analyze:
    name: Analyze (Java)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        # Changing this from java-kotlin to java completely unloads the failing Kotlin extractor
        languages: java
        build-mode: manual

    - name: Run manual build steps
      shell: bash
      run: |
        chmod +x ./gradlew
        ./gradlew clean compileDebugJavaWithJavac compileDebugKotlin --no-daemon

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:java"
